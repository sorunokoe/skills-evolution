name: Skills Health
# Reusable workflow — the consumer's wrapper defines when this runs.
# Example wrapper trigger:
#   on:
#     schedule:
#       - cron: "0 3 1 * *"   # monthly
#     workflow_dispatch:        # manual trigger

on:
  workflow_call:
    inputs:
      since_days:
        required: false
        type: string
        default: "35"
      auto_fix_metadata_links:
        required: false
        type: boolean
        default: true
      enable_ai_review:
        required: false
        type: boolean
        default: false
      enable_ai_skill_update:
        required: false
        type: boolean
        default: false
        # When true: fetches latest library versions from GitHub releases, calls GitHub Models
        # (gpt-4o-mini by default) once per skill file, and applies conservative inline patches.
        # Requires GITHUB_TOKEN to have models:read (granted automatically in Actions runners).
      ai_model:
        required: false
        type: string
        default: "gpt-4o-mini"
        # GitHub Models model ID. See https://github.com/marketplace/models
      tracked_deps:
        required: false
        type: string
        default: ""
        # JSON array of {alias, repo} objects to override auto-discovered deps.
        # By default, deps are discovered automatically from Package.resolved, go.mod,
        # Cargo.lock, pubspec.yaml, and package.json files in the repository.
      max_skills:
        required: false
        type: string
        default: "15"
        # Maximum number of skill files to send to GitHub Models per run.
      open_pr_on_findings:
        required: false
        type: boolean
        default: false
      task_number:
        required: false
        type: string
        default: ""
      tools_repo:
        required: false
        type: string
        default: sorunokoe/skills-evolution
      tools_ref:
        required: false
        type: string
        default: main
    secrets:
      token:
        required: true
      copilot_token:
        required: false
    outputs:
      findings_count:
        value: ${{ jobs.skills-health.outputs.findings_count }}
      proposal_count:
        value: ${{ jobs.skills-health.outputs.proposal_count }}
      has_findings:
        value: ${{ jobs.skills-health.outputs.has_findings }}

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  skills-health:
    name: Analyze skills health
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      findings_count: ${{ steps.counts.outputs.findings_count }}
      proposal_count: ${{ steps.counts.outputs.proposal_count }}
      has_findings: ${{ steps.counts.outputs.has_findings }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Checkout skills-evolution tools
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ inputs.tools_repo }}
          ref: ${{ inputs.tools_ref }}
          path: .skills-evolution

      - name: Run structural skills audit
        env:
          PYTHONPATH: ${{ github.workspace }}/.skills-evolution/src
        run: |
          mkdir -p outputs
          if [[ "${{ inputs.auto_fix_metadata_links }}" == "true" ]]; then
            python3 -m skills_evolution.health audit --repo-root . --output-dir outputs --apply-autofix
          else
            python3 -m skills_evolution.health audit --repo-root . --output-dir outputs
          fi

      - name: Collect PR feedback data
        env:
          PYTHONPATH: ${{ github.workspace }}/.skills-evolution/src
          GH_TOKEN: ${{ secrets.token }}
        run: |
          python3 -m skills_evolution.health collect-feedback \
            --repo "${{ github.repository }}" \
            --token "$GH_TOKEN" \
            --since-days "${{ inputs.since_days }}" \
            --output outputs/skills-feedback-raw.json

      - name: Analyze trace feedback
        env:
          PYTHONPATH: ${{ github.workspace }}/.skills-evolution/src
        run: |
          python3 -m skills_evolution.health feedback \
            --repo-root . \
            --raw outputs/skills-feedback-raw.json \
            --output-dir outputs

      - name: AI skill content update
        if: inputs.enable_ai_skill_update == true
        env:
          PYTHONPATH: ${{ github.workspace }}/.skills-evolution/src
          GH_TOKEN: ${{ secrets.token }}
        run: |
          DEPS_ARG=""
          if [[ -n "${{ inputs.tracked_deps }}" ]]; then
            DEPS_ARG="--tracked-deps '${{ inputs.tracked_deps }}'"
          fi
          python3 -m skills_evolution.ai_updater \
            --repo-root . \
            --output-dir outputs \
            --token "$GH_TOKEN" \
            --model "${{ inputs.ai_model }}" \
            --max-skills "${{ inputs.max_skills }}" \
            $DEPS_ARG | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Set up Node.js for optional AI review
        if: inputs.enable_ai_review == true
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4

      - name: Install Copilot CLI
        if: inputs.enable_ai_review == true
        run: npm install -g @github/copilot@1.0.7

      - name: Optional AI review of disputed traces
        if: inputs.enable_ai_review == true
        env:
          PYTHONPATH: ${{ github.workspace }}/.skills-evolution/src
        run: |
          python3 -m skills_evolution.semantic \
            --repo-root . \
            --output-dir outputs \
            --copilot-token "${{ secrets.copilot_token }}"

      - name: Combine report
        id: counts
        env:
          PYTHONPATH: ${{ github.workspace }}/.skills-evolution/src
        run: |
          python3 -m skills_evolution.health combine --output-dir outputs > outputs/skills-health-counts.env
          cat outputs/skills-health-counts.env >> "$GITHUB_OUTPUT"

      - name: Guard task number for opt-in PR creation
        id: task
        if: steps.counts.outputs.has_findings == 'true' && inputs.open_pr_on_findings == true
        run: |
          TASK_NUMBER="${{ inputs.task_number }}"
          if [[ -z "$TASK_NUMBER" || ! "$TASK_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "task_valid=false" >> "$GITHUB_OUTPUT"
            echo "::warning::task-number is missing or invalid. Skipping PR creation."
          else
            echo "task_valid=true" >> "$GITHUB_OUTPUT"
            echo "task_number=$TASK_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit report and safe autofixes
        if: steps.counts.outputs.has_findings == 'true' && inputs.open_pr_on_findings == true && steps.task.outputs.task_valid == 'true'
        run: |
          BRANCH_NAME="skills-health/$(date -u +%Y-%m)"
          mkdir -p .github/skills/health-reports
          REPORT_FILE=".github/skills/health-reports/$(date -u +%Y-%m).md"
          cp outputs/skills-health-summary.md "$REPORT_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH_NAME"
          git add .github/skills
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "NO_CHANGES=true" >> $GITHUB_ENV
            exit 0
          fi
          git commit -m "${{ steps.task.outputs.task_number }} - Skills health report $(date -u +%Y-%m)"
          git push --force origin "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Create or update monthly PR
        if: steps.counts.outputs.has_findings == 'true' && inputs.open_pr_on_findings == true && steps.task.outputs.task_valid == 'true' && env.NO_CHANGES != 'true'
        env:
          GH_TOKEN: ${{ secrets.token }}
        run: |
          TITLE="${{ steps.task.outputs.task_number }} - Skills health report $(date -u +%Y-%m)"
          BODY_FILE="outputs/skills-health-summary.md"
          PR_STATE=$(gh pr view "$BRANCH_NAME" --json state --jq .state 2>/dev/null || echo "NONE")
          if [ "$PR_STATE" = "OPEN" ]; then
            gh pr edit "$BRANCH_NAME" --title "$TITLE" --body-file "$BODY_FILE" || true
          else
            gh pr create \
              --title "$TITLE" \
              --body-file "$BODY_FILE" \
              --base main \
              --head "$BRANCH_NAME" \
              || echo "⚠️ PR creation skipped — enable 'Allow GitHub Actions to create pull requests' in repo Settings → Actions → General." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: skills-health-${{ github.run_id }}
          path: outputs/
