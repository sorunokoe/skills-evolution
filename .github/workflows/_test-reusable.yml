name: Test Reusable With Outputs

on:
  workflow_call:
    inputs:
      test_input:
        required: false
        type: string
        default: "hello"
      test_number:
        required: true
        type: number
    secrets:
      test_secret:
        required: true
    outputs:
      test_output:
        value: ${{ jobs.test-job.outputs.test_output }}

permissions:
  contents: write
  pull-requests: write

jobs:
  test-job:
    runs-on: ubuntu-latest
    outputs:
      test_output: ${{ steps.test.outputs.result }}
    steps:
      - name: Test step
        id: test
        run: echo "result=ok" >> "$GITHUB_OUTPUT"
