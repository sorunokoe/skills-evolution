name: Skills Trace Fallback Capture

on:
  workflow_call:
    inputs:
      repo:
        required: true
        type: string
      pr_number:
        required: true
        type: number
      tools_repo:
        required: false
        type: string
        default: sorunokoe/skills-evolution
      tools_ref:
        required: false
        type: string
        default: main
    secrets:
      github_token:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  transport-skill-traces:
    name: Fallback trace capture
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Checkout skills-evolution tools
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: ${{ inputs.tools_repo }}
          ref: ${{ inputs.tools_ref }}
          path: .skills-evolution

      - name: "Fallback: move committed skill traces into PR body"
        env:
          PYTHONPATH: ${{ github.workspace }}/.skills-evolution/src
          GH_TOKEN: ${{ secrets.github_token }}
        run: |
          python3 -m skills_evolution.cli fallback \
            --repo "${{ inputs.repo }}" \
            --pr-number "${{ inputs.pr_number }}" \
            --token "$GH_TOKEN"
